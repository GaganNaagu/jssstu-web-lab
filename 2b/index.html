<!DOCTYPE html>
<html>

<head>
    <title>Frames using iframe</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
        }

        .nav-frame {
            width: 20%;
        }

        .content-frame {
            width: 80%;
        }

        iframe {
            width: 100%;
            height: 100%;
        }
    </style>
</head>

<body>
    <div class="nav-frame">
        <iframe src="nav.html" name="navFrame"></iframe>
    </div>
    <div class="content-frame">
        <iframe src="content1.html" name="contentFrame"></iframe>
    </div>
</body>

</html>
