<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">

<head>
    <title>Student Marks Average</title>
    <style type="text/css">
        .form-box {
            width: 300px;
            padding: 20px;
            border: 1px solid black;
            margin: 20px auto;
        }

        .form-box div {
            margin-bottom: 10px;
        }

        label {
            display: inline-block;
            width: 120px;
        }

        input[type="text"] {
            width: 150px;
        }
    </style>
    <script type="text/javascript">

        function computeAverage() {
            var regNo = document.getElementById("regNo").value;
            var subCode = document.getElementById("subCode").value;
            var test1 = document.getElementById("test1").value;
            var test2 = document.getElementById("test2").value;
            var test3 = document.getElementById("test3").value;

            if (regNo === "" || subCode === "" || test1 === "" || test2 === "" || test3 === "") {
                alert("All fields are mandatory.");
                return;
            }

            var t1 = parseFloat(test1);
            var t2 = parseFloat(test2);
            var t3 = parseFloat(test3);

            if (isNaN(t1) || isNaN(t2) || isNaN(t3)) {
                alert("Please enter valid numeric marks for all three tests.");
                return;
            }

            if (t1 < 0 || t2 < 0 || t3 < 0 || t1 > 30 || t2 > 30 || t3 > 30) {
                alert("Marks should be between 0 and 30.");
                return;
            }

            var marks = [t1, t2, t3];
            marks.sort(function (a, b) { return b - a; });

            var bestTwoAvg = (marks[0] + marks[1]) / 2;

            alert("Register No: " + regNo + "\nSubject Code: " + subCode + "\nAverage of best two tests: " + bestTwoAvg);
        }
    </script>
</head>

<body>

    <div class="form-box">
        <h3>Calculate Average Marks</h3>
        <div>
            <label for="regNo">Register Number:</label>
            <input type="text" id="regNo" />
        </div>
        <div>
            <label for="subCode">Subject Code:</label>
            <input type="text" id="subCode" />
        </div>
        <div>
            <label for="test1">Test 1 Marks:</label>
            <input type="text" id="test1" />
        </div>
        <div>
            <label for="test2">Test 2 Marks:</label>
            <input type="text" id="test2" />
        </div>
        <div>
            <label for="test3">Test 3 Marks:</label>
            <input type="text" id="test3" />
        </div>
        <div>
            <button type="button" onclick="computeAverage()">Compute Average</button>
        </div>
    </div>

</body>

</html>
