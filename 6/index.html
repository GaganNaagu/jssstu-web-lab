<!DOCTYPE html>
<html>
<head>
    <title>JSS Science and Technology University</title>
    <!-- External CSS -->
    <link rel="stylesheet" type="text/css" href="style.css">
    
    <!-- Internal CSS -->
    <style>
        .internal-header {
            background-color: #004080;
            color: #ffffff;
            padding: 20px;
            border-radius: 8px;
        }
        .institute-image {
            width: 100%;
            max-width: 600px;
            border: 5px solid #004080;
            border-radius: 10px;
            margin: 20px 0;
        }
        .desc-paragraph {
            font-size: 18px;
            line-height: 1.6;
            color: #333333;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="internal-header">
        <h1>JSS Science and Technology University</h1>
        <h3>Mysuru, Karnataka</h3>
    </div>

    <img src="https://upload.wikimedia.org/wikipedia/en/4/4c/JSS_Science_and_Technology_University_logo.png" alt="Institute Image" class="institute-image">

    <p class="desc-paragraph">
        Welcome to <span class="highlight-text">JSS STU</span>. We are committed to providing world-class education. 
        Our campus is equipped with state-of-the-art facilities and experienced faculty.
    </p>

    <!-- Inline CSS -->
    <p style="background-color: #ffffcc; color: #800000; padding: 15px; border-left: 5px solid #ff0000; font-weight: bold; font-style: italic;">
        Notice: Admissions for the academic year 2026-2027 are now open!
    </p>

</div>

</body>
</html>
