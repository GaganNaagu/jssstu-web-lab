<!DOCTYPE html>
<html>
<head>
    <title>Simple Calculator</title>
    <style>
        body { font-family: sans-serif; text-align: center; margin-top: 50px; }
        .calc-box { display: inline-block; padding: 20px; border: 1px solid #000; border-radius: 10px; background-color: #f9f9f9; }
        input[type="number"] { width: 100px; padding: 5px; margin: 5px; }
        button { padding: 5px 15px; margin: 5px; cursor: pointer; }
        #result { margin-top: 15px; font-weight: bold; font-size: 20px; color: blue; }
    </style>
</head>
<body>

<div class="calc-box">
    <h2>Simple Calculator</h2>
    <input type="number" id="num1" placeholder="Number 1">
    <input type="number" id="num2" placeholder="Number 2">
    <br><br>
    <button onclick="calculate('+')">Add (+)</button>
    <button onclick="calculate('-')">Subtract (-)</button>
    <button onclick="calculate('*')">Multiply (*)</button>
    <button onclick="calculate('/')">Divide (/)</button>
    
    <div id="result">Result: </div>
</div>

<script>
    function calculate(operator) {
        let n1 = parseFloat(document.getElementById('num1').value);
        let n2 = parseFloat(document.getElementById('num2').value);
        let resultDiv = document.getElementById('result');

        if (isNaN(n1) || isNaN(n2)) {
            resultDiv.innerHTML = "Result: <span style='color:red;'>Please enter valid numbers.</span>";
            return;
        }

        let result = 0;
        switch(operator) {
            case '+': result = n1 + n2; break;
            case '-': result = n1 - n2; break;
            case '*': result = n1 * n2; break;
            case '/': 
                if(n2 === 0) {
                    resultDiv.innerHTML = "Result: <span style='color:red;'>Cannot divide by zero.</span>";
                    return;
                }
                result = n1 / n2; 
                break;
        }
        resultDiv.innerHTML = "Result: " + result;
    }
</script>

</body>
</html>
