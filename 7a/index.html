<!DOCTYPE html>
<html>

<head>
    <title>Simple Calculator</title>
    <style>
        body {
            text-align: center;
            margin-top: 50px;
        }

        .calc {
            display: inline-block;
            padding: 15px;
            border: 2px solid black;
        }

        #display {
            width: 155px;
            padding: 5px;
            margin-bottom: 10px;
            text-align: right;
            font-size: 18px;
        }

        button {
            width: 35px;
            height: 35px;
            margin: 2px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="calc">
        <input type="text" id="display" readonly>
        <br>

        <button onclick="v('7')">7</button>
        <button onclick="v('8')">8</button>
        <button onclick="v('9')">9</button>
        <button onclick="v('/')">/</button>
        <br>

        <button onclick="v('4')">4</button>
        <button onclick="v('5')">5</button>
        <button onclick="v('6')">6</button>
        <button onclick="v('*')">*</button>
        <br>

        <button onclick="v('1')">1</button>
        <button onclick="v('2')">2</button>
        <button onclick="v('3')">3</button>
        <button onclick="v('-')">-</button>
        <br>

        <button onclick="v('0')">0</button>
        <button onclick="c()">C</button>
        <button onclick="e()">=</button>
        <button onclick="v('+')">+</button>
    </div>

    <script>
        let d = document.getElementById('display');

        function v(val) {
            d.value += val;
        }

        function c() {
            d.value = '';
        }

        function e() {
            try {
                d.value = eval(d.value);
            } catch (err) {
                d.value = 'Error';
            }
        }
    </script>

</body>

</html>
